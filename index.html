<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Card — Video</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
    #scan-hint {
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      text-align: center;
      position: fixed;
      bottom: 60px;
      z-index: 1000;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 0.5s;
    }
    #scan-hint.hidden { opacity: 0; }
    #found-badge {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,200,100,0.85);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 600;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #found-badge.show { opacity: 1; }
  </style>
  <script>
    AFRAME.registerComponent('video-target', {
      init: function () {
        const vid = document.getElementById('ar-video');
        const hint = document.getElementById('scan-hint');
        const badge = document.getElementById('found-badge');

        this.el.addEventListener('targetFound', () => {
          vid.play();
          hint.classList.add('hidden');
          badge.classList.add('show');
          setTimeout(() => badge.classList.remove('show'), 2000);
        });

        this.el.addEventListener('targetLost', () => {
          vid.pause();
          hint.classList.remove('hidden');
        });
      }
    });
  </script>
</head>
<body>
  <div id="scan-hint">Point your camera at the card</div>
  <div id="found-badge">Card detected!</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="3000">
      <video id="ar-video"
             src="./video.mp4"
             preload="auto"
             loop
             muted
             playsinline
             webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" video-target>
      <a-video src="#ar-video" position="0 0.4 0.05" width="1" height="0.56"></a-video>
    </a-entity>

  </a-scene>
</body>
</html>
