<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Card Demo</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #scan-hint {
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      text-align: center;
      position: fixed;
      bottom: 60px;
      transition: opacity 0.5s;
    }
    #scan-hint.hidden { opacity: 0; }
    #scan-frame {
      width: 220px;
      height: 220px;
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      position: relative;
      transition: opacity 0.5s;
    }
    #scan-frame.hidden { opacity: 0; }
    #scan-line {
      position: absolute;
      top: 0; left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%, 100% { top: 8px; }
      50% { top: calc(100% - 10px); }
    }
    #found-badge {
      position: fixed;
      top: 40px;
      background: rgba(0,200,100,0.85);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 600;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #found-badge.show { opacity: 1; }
  </style>
  <script>
    AFRAME.registerComponent('target-events', {
      init: function () {
        const hint = document.getElementById('scan-hint');
        const frame = document.getElementById('scan-frame');
        const badge = document.getElementById('found-badge');
        this.el.addEventListener('targetFound', () => {
          hint.classList.add('hidden');
          frame.classList.add('hidden');
          badge.classList.add('show');
          setTimeout(() => badge.classList.remove('show'), 2000);
        });
        this.el.addEventListener('targetLost', () => {
          hint.classList.remove('hidden');
          frame.classList.remove('hidden');
        });
      }
    });
  </script>
</head>
<body>
  <div id="overlay">
    <div id="scan-frame">
      <div id="scan-line"></div>
    </div>
  </div>
  <div id="scan-hint">Point your camera at the card</div>
  <div id="found-badge">Card detected!</div>

  <!--
    TO USE YOUR OWN IMAGE:
    1. Go to https://hiukim.github.io/mind-ar-js-doc/tools/compile/
    2. Upload your image, click Start, download targets.mind
    3. Put targets.mind next to this index.html
    4. Change imageTargetSrc below to: ./targets.mind
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./RDRTarget.mind;
                   filterMinCF: 0.001;
                   filterBeta: 100;
                   missTolerance: 15;
                   uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" target-events>

      <!-- Glow overlay on the card surface -->
      <a-plane position="0 0 0" width="1" height="0.552"
        color="#00ff88" opacity="0.15" material="transparent: true">
      </a-plane>

      <!-- Spinning cube floating above card -->
      <a-box position="0 0.35 0.15" width="0.25" height="0.25" depth="0.25"
        color="#4CC3D9" material="metalness: 0.3; roughness: 0.4"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear"
        animation__float="property: position; from: 0 0.3 0.15; to: 0 0.45 0.15;
                          loop: true; dur: 2000; dir: alternate; easing: easeInOutSine">
      </a-box>

      <!-- Orbiting red sphere -->
      <a-entity position="0 0.35 0.15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        <a-sphere position="0.35 0 0" radius="0.06" color="#EF2D5E"
          material="metalness: 0.5; roughness: 0.2">
        </a-sphere>
      </a-entity>

      <!-- Orbiting gold sphere (opposite direction) -->
      <a-entity position="0 0.35 0.15"
        animation="property: rotation; to: 0 -360 0; loop: true; dur: 2400; easing: linear">
        <a-sphere position="0 0 0.3" radius="0.04" color="#FFC65D"
          material="metalness: 0.5; roughness: 0.2">
        </a-sphere>
      </a-entity>

      <!-- Floating text -->
      <a-text value="Hello from AR!" position="0 0.65 0.1" align="center"
        color="#ffffff" width="1.2" font="mozillavr"
        animation="property: position; from: 0 0.62 0.1; to: 0 0.68 0.1;
                   loop: true; dur: 1500; dir: alternate; easing: easeInOutSine">
      </a-text>

      <!-- Purple ring -->
      <a-torus position="0 0.35 0.15" radius="0.4" radius-tubular="0.008"
        color="#7B68EE" material="opacity: 0.7; transparent: true" rotation="90 0 0"
        animation="property: rotation; from: 90 0 0; to: 90 360 0;
                   loop: true; dur: 6000; easing: linear">
      </a-torus>

      <!-- Green tilted ring -->
      <a-torus position="0 0.35 0.15" radius="0.35" radius-tubular="0.006"
        color="#00ff88" material="opacity: 0.5; transparent: true" rotation="60 45 0"
        animation="property: rotation; from: 60 45 0; to: 60 405 0;
                   loop: true; dur: 5000; easing: linear">
      </a-torus>

      <!-- Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

    </a-entity>
  </a-scene>
</body>
</html>
